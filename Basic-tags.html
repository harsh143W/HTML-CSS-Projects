<!DOCTYPE html>
<html lang="en">
<head>
  <title>Basic tags of HTML</title>
</head>
<body>

  <!--Heading tags  --> 
  <h1> Heading 1</h1>
  <h2> Heading 2 </h2>
  <h3> Heading 3 </h3>

  <!--Paragraphs tags -->
  <p>This is a Paragraphs tag </p>

  <!--link --> 
  <a href="https://www.google.com/?zx=1780050406506">Clikc me for Google </a> <br>

  <!--Image --> 
  <img src="image" > <br> 

  <!--List tag -->
  <!--order list and unordered list --> 
  <ul> <br> 
    <li>Apple</li>
    <li>Banana</li>
  </ul>
  <ol>
    <li>First step</li>
    <li>Second step</li>
  </ol>

  <!-- Tables -->
  <table border="1">
    <tr>
      <th>Name </th> <th> Age </th>
    </tr>
    <tr>
      <td>Alice</td><td>25</td>
    </tr>
  </table>
  
  <!--Forms --> 
  <form action="/submit" method="post"> 
    <input type="text" name="username">
    <button type="submit"submit></button>
  </form>

  <!--Input types -->
  <input type="text"> <br> 
  <input type="email"> <br>
  <input type="password"> <br>
  <input type="checkbox"> <br>
  <input type="radio"> <br>
  <input type="date"> <br> 

  <!--Buttons -->
  <button>Click me </button> <br> 
  <input type="submit" value="Submit">  <br>

  <!-- Semantic tags --> 
  <!-- It's give meaning to structure --> 

  <header>Sita header</header>  <br>
  <nav>Naviagation links </nav> <br>
  <main>  Maain Content </main> <br>
  <footer>Footer Infor</footer> <br>

  <!-- Audio / Video -->

  <audio controls>
    <source src="audio.mp3" type="audio/mpeg"> 
  </audio>

  <video controls width="400">  
    <source src="movie.mp4" type="video/mp4" > 
  </video>

  <!-- iframe -->

  <iframe src="https://www.wikipedia.org/" width="600" height="400"></iframe>

  
</body>
</html>
